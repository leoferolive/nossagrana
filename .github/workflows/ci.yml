name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "CHANGED_FILES=" >> "$GITHUB_ENV"
          else
            {
              echo "CHANGED_FILES<<EOF"
              git diff --name-only "$BASE_SHA...$HEAD_SHA"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Prettier check (changed files)
        run: pnpm format:check:changed

      - name: Oxlint fast-pass
        run: pnpm lint:fast

      - name: ESLint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build

      - name: Dead code check (Knip)
        run: pnpm knip

  api-tests:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: pnpm --filter @nossagrana/types build

      - name: API tests with coverage
        env:
          CI: 'true'
        run: pnpm --filter api test:coverage

      - name: Collect changed files (API only)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          {
            echo "CHANGED_FILES<<EOF"
            git diff --name-only "$BASE_SHA...$HEAD_SHA" | grep '^apps/api/' || true
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Changed-file coverage gate
        if: github.event_name == 'pull_request'
        env:
          MIN_CHANGED_COVERAGE: '80'
        run: pnpm coverage:changed-check

  # web-tests: desabilitado no CI (trava no Pi ARM64)
  # Rodar localmente via skill /run-tests antes de commitar
  # TODO: migrar para ubuntu-latest quando possível

  audit:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Production dependency audit
        run: pnpm security:audit

  gitleaks:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Cleanup stale gitleaks tarball
        run: rm -f /tmp/gitleaks.tmp

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install semgrep
        run: |
          if [ ! -f ~/semgrep-venv/bin/semgrep ]; then
            python3 -m venv ~/semgrep-venv
            ~/semgrep-venv/bin/pip install semgrep --quiet
          fi

      - name: Semgrep scan
        run: |
          # Regras de hardening de supply-chain do pnpm excluidas temporariamente:
          # exigem settings do pnpm 10 (projeto em pnpm 9.15). Rastreado na issue #34.
          ~/semgrep-venv/bin/semgrep scan \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --config p/secrets \
            --exclude-rule package_managers.pnpm.pnpm-block-exotic-sub-dependencies.pnpm-block-exotic-sub-dependencies \
            --exclude-rule package_managers.pnpm.pnpm-missing-minimum-release-age.pnpm-minimum-release-age \
            --exclude-rule package_managers.pnpm.pnpm-trust-policy.pnpm-trust-policy \
            --error
