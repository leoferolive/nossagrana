name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "CHANGED_FILES=" >> "$GITHUB_ENV"
          else
            {
              echo "CHANGED_FILES<<EOF"
              git diff --name-only "$BASE_SHA...$HEAD_SHA"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Prettier check (changed files)
        run: pnpm format:check:changed

      - name: Oxlint fast-pass
        run: pnpm lint:fast

      - name: ESLint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build

  tests-and-coverage:
    runs-on: [self-hosted, Linux, ARM64]
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Collect changed files
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "CHANGED_FILES<<EOF"
            git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Changed-file coverage gate
        if: github.event_name == 'pull_request'
        env:
          MIN_CHANGED_COVERAGE: '80'
        run: pnpm coverage:changed-check

  audit:
    runs-on: [self-hosted, Linux, ARM64]
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Production dependency audit
        run: pnpm security:audit

  gitleaks:
    runs-on: [self-hosted, Linux, ARM64]
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    runs-on: [self-hosted, Linux, ARM64]
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install semgrep
        run: |
          python3 -m venv /tmp/semgrep-venv
          /tmp/semgrep-venv/bin/pip install semgrep --quiet

      - name: Semgrep scan
        run: |
          /tmp/semgrep-venv/bin/semgrep scan \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --config p/secrets \
            --error
