name: Dependency Drift Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read

jobs:
  check:
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency drift report
        run: |
          set -euo pipefail
          if pnpm deps:check > outdated.txt 2>&1; then
            echo "No dependency drift detected."
            {
              echo "## Dependency Drift Check"
              echo
              echo "No outdated dependencies detected."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Outdated dependencies detected."
            {
              echo "## Dependency Drift Check"
              echo
              echo "Outdated dependencies found:"
              echo
              echo '```text'
              cat outdated.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
