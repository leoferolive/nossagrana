name: Dependency Drift Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency drift report
        run: |
          set -euo pipefail
          if pnpm deps:check > outdated.txt 2>&1; then
            echo "No dependency drift detected."
            {
              echo "## Dependency Drift Check"
              echo
              echo "No outdated dependencies detected."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Outdated dependencies detected."
            {
              echo "## Dependency Drift Check"
              echo
              echo "Outdated dependencies found:"
              echo
              echo '```text'
              cat outdated.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
