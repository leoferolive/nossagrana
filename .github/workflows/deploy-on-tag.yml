name: Deploy Dev on Release Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag semantica da imagem a deployar em dev (ex: v1.2.3)'
        required: true
      ref:
        description: 'Ref do checkout que sera reconstruido (normalmente o SHA correspondente a tag)'
        required: true

concurrency:
  group: deploy-dev-on-tag
  cancel-in-progress: false

jobs:
  validate-inputs:
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: Validar formato da tag estavel
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag invalida: '$TAG'. Use formato estavel vX.Y.Z (sem -rc)."
            exit 1
          fi

      - name: Checkout para validacao de tag/ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar alinhamento entre tag e ref
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          REF="${{ inputs.ref }}"

          TAG_SHA="$(git rev-list -n 1 "$TAG" || true)"
          if [ -z "$TAG_SHA" ]; then
            echo "::error::Tag '$TAG' nao encontrada no repositorio."
            exit 1
          fi

          REF_SHA="$(git rev-parse "$REF" || true)"
          if [ -z "$REF_SHA" ]; then
            echo "::error::Ref '$REF' nao encontrada no repositorio."
            exit 1
          fi

          if [ "$TAG_SHA" != "$REF_SHA" ]; then
            echo "::error::Tag '$TAG' aponta para '$TAG_SHA', mas o ref informado resolve para '$REF_SHA'."
            exit 1
          fi

  deploy-dev:
    needs: validate-inputs
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment: dev
      tag: ${{ inputs.tag }}
      ref: ${{ inputs.ref }}
    secrets: inherit

  summary:
    needs: [validate-inputs, deploy-dev]
    if: always()
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: Resumo do workflow
        run: |
          DEPLOY_RESULT="${{ needs.deploy-dev.result }}"
          RESULT_LABEL="SUCESSO"
          if [ "$DEPLOY_RESULT" != "success" ]; then
            RESULT_LABEL="FALHA"
          fi

          {
            echo "## Deployment Summary"
            echo
            echo "| Campo | Valor |"
            echo "| --- | --- |"
            echo "| Resultado | $RESULT_LABEL |"
            echo "| Environment | dev |"
            echo "| Tag version deployada | \`${{ inputs.tag }}\` |"
            echo "| Ref usado | \`${{ inputs.ref }}\` |"
            echo "| Status deploy | \`$DEPLOY_RESULT\` |"
          } >> "$GITHUB_STEP_SUMMARY"
