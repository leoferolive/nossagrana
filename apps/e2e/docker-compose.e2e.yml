services:
  postgres-e2e:
    image: postgres:16
    environment:
      POSTGRES_USER: nossagrana_e2e
      POSTGRES_PASSWORD: nossagrana_e2e
      POSTGRES_DB: nossagrana_e2e
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nossagrana_e2e']
      interval: 5s
      timeout: 5s
      retries: 5
