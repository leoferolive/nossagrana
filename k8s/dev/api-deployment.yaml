apiVersion: apps/v1
kind: Deployment
metadata:
  name: nossagrana-dev-api
  namespace: nossagrana-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nossagrana-dev-api
  template:
    metadata:
      labels:
        app: nossagrana-dev-api
    spec:
      containers:
        - name: nossagrana-dev-api
          image: ghcr.io/leoferolive/nossagrana-dev-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          envFrom:
            - secretRef:
                name: nossagrana-api-secrets
            - configMapRef:
                name: nossagrana-dev-api-config
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
