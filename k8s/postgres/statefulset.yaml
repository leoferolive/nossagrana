apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nossagrana-postgres
  namespace: nossagrana
spec:
  serviceName: nossagrana-postgres
  replicas: 1
  selector:
    matchLabels:
      app: nossagrana-postgres
  template:
    metadata:
      labels:
        app: nossagrana-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: nossagrana-postgres-secrets
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ['ReadWriteOnce']
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nossagrana-postgres
  namespace: nossagrana
spec:
  selector:
    app: nossagrana-postgres
  ports:
    - port: 5432
      targetPort: 5432
