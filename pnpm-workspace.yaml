packages:
  - 'apps/*'
  - 'packages/*'

# Hardening de supply-chain (settings do pnpm 10) — ver issue #34
minimumReleaseAge: 10080 # espera 7 dias antes de instalar versoes recem-publicadas
blockExoticSubdeps: true # bloqueia subdependencias de fontes nao-registry (git, etc.)
trustPolicy: no-downgrade # impede que updates rebaixem settings de seguranca
